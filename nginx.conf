server {
    listen 80;
    server_name sync-ledger.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sync-ledger.live www.sync-ledger.live;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    root /usr/share/nginx/html;

    location / {
        # Более мягкая проверка
        set $is_tg 0;

        # Проверка User-Agent (работает на Android и иногда на iOS)
        if ($http_user_agent ~* "Telegram|WebView") {
            set $is_tg 1;
        }

        # Проверка реферера (иногда приходит)
        if ($http_referer ~* "^https?://(t\.me|telegram\.)") {
            set $is_tg "${is_tg}1";
        }

        # Если ничего не подошло — блокируем
        if ($is_tg = 0) {
            return 403;
        }

        index auth.html;
        try_files $uri $uri/ /auth.html;
    }

    location /user/ {
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}