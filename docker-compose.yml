version: '3.8'
services:
  # Бэкенд API
  backend:
    build: .
    container_name: backend
    restart: always
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file: .env

    volumes:
      - .:/app             # Прокидываем весь проект в контейнер
      - db_data:/app/backend/data # ВАЖНО: отдельный том для базы

  # Бот (запускается отдельно)
  bot:
    build: .
    restart: always
    command: python -m bot_app.main
    env_file: .env

  # Веб-сервер (раздает статику и проксирует запросы)
  nginx:
    image: nginx:alpine
    user: "0:0"
    restart: always
    ports:
      - "80:80"  # Снаружи будет 8080, внутри контейнера —
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/my-site.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      # Монтируем именно ту папку, в которой лежат html файлы
      - ./ledger-mobile/ledger-mobile:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  db_data: