<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sync Ledger</title>
    <script>
        // Ждем, пока прогрузится объект Telegram, так как он может появляться с задержкой
        window.addEventListener('load', () => {
            if (!window.Telegram || !window.Telegram.WebApp.initData) {
                document.body.innerHTML = `
                    <div style="text-align: center; margin-top: 20%; font-family: sans-serif;">
                        <h1>Access error</h1>
                        <p>This app only works inside Telegram Mini App.</p>
                        <a href="https://t.me/ledger_mobile_bot">Открыть в Telegram</a>
                    </div>
                `;
            } else {
                // Если мы в ТГ, делаем редирект на auth.html
                window.location.href = './auth.html';
            }
        });
    </script>
</head>
<body>
<p>Checking environment...</p>
</body>
</html>
