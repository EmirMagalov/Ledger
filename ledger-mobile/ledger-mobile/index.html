<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sync Ledger</title>
    <script>
        // Функция проверки с ожиданием
        function checkTelegram() {
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
                // Если мы в Telegram, переходим дальше
                window.location.href = './auth.html';
            } else {
                // Если прождали какое-то время и ничего нет — показываем ошибку
                document.body.innerHTML = `
                    <div style="text-align: center; margin-top: 20%; font-family: sans-serif;">
                        <h1>Access error</h1>
                        <p>This app only works inside Telegram Mini App.</p>
                        <a href="https://t.me/ledger_mobile_bot">Открыть в Telegram</a>
                    </div>
                `;
            }
        }

        // Ждем 500мс, чтобы скрипты Telegram успели загрузиться
        setTimeout(checkTelegram, 500);
    </script>
</head>
<body>
<p>Loading...</p>
</body>
</html>
