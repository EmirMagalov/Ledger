  />
  <title>Ledger | Import Wallet</title>

<body class="body">
<main class="main">
  <section class="import create auth">
    <div style="display: flex; justify-content: center; align-items: center;">
      <div style="position: absolute; left: 35px; ">
        <a href="auth.html">
          <img src="./icons/Back.svg" alt="" width="37" height="37">
        </a>
      </div>
    <div class="auth__brand">
      <img
        class="auth__logo"
        src="./icons/ledgerLogo.svg"
        alt="ledger Live Logo"
        width="158"
        height="30"
        loading="lazy"
      />
    </div>
    </div>
    <h1 class="create__title auth__title">Import Wallet</h1>
    <div class="import__description create__description auth__description">
      <p>Enter your recovery phrase (12-Seed Phrase)</p>
    </div>
    <div class="import__actions create__actions">
      <div class="create__switcher" role="tablist">
        <button
          type="button"
          class="create__switcher-btn is-active"
          data-words="12"
          role="tab"
          aria-selected="true"
        >12 words</button>
        <button
          type="button"
          class="create__switcher-btn"
          data-words="24"
          role="tab"
          aria-selected="false"
        >24 words</button>
      </div>
    </div>

    <!-- РљР°СЂС‚РѕС‡РєР° СЃ С„СЂР°Р·РѕР№ -->
    <div class="import__card create__card">
      <ul class="import__grid create__grid" data-js-phrase-grid></ul>
      <div class="create__suggestions" data-js-suggestions></div>
      <div class="import__card-actions">
        <button class="import__actions-paste-button" type="button">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.875 11.0833H3.20833C2.35771 11.0824 1.5422 10.7441 0.940722 10.1426C0.339244 9.54113 0.000926432 8.72562 0 7.875L0 3.20833C0.000926432 2.35771 0.339244 1.5422 0.940722 0.940722C1.5422 0.339244 2.35771 0.000926432 3.20833 0L7.875 0C8.72562 0.000926432 9.54113 0.339244 10.1426 0.940722C10.7441 1.5422 11.0824 2.35771 11.0833 3.20833V7.875C11.0824 8.72562 10.7441 9.54113 10.1426 10.1426C9.54113 10.7441 8.72562 11.0824 7.875 11.0833ZM3.20833 1.75C2.82156 1.75 2.45063 1.90365 2.17714 2.17714C1.90365 2.45063 1.75 2.82156 1.75 3.20833V7.875C1.75 8.26177 1.90365 8.63271 2.17714 8.9062C2.45063 9.17969 2.82156 9.33333 3.20833 9.33333H7.875C8.26177 9.33333 8.63271 9.17969 8.9062 8.9062C9.17969 8.63271 9.33333 8.26177 9.33333 7.875V3.20833C9.33333 2.82156 9.17969 2.45063 8.9062 2.17714C8.63271 1.90365 8.26177 1.75 7.875 1.75H3.20833ZM14 10.7917V4.08333C14 3.85127 13.9078 3.62871 13.7437 3.46461C13.5796 3.30052 13.3571 3.20833 13.125 3.20833C12.8929 3.20833 12.6704 3.30052 12.5063 3.46461C12.3422 3.62871 12.25 3.85127 12.25 4.08333V10.7917C12.25 11.1784 12.0964 11.5494 11.8229 11.8229C11.5494 12.0964 11.1784 12.25 10.7917 12.25H4.08333C3.85127 12.25 3.62871 12.3422 3.46461 12.5063C3.30052 12.6704 3.20833 12.8929 3.20833 13.125C3.20833 13.3571 3.30052 13.5796 3.46461 13.7437C3.62871 13.9078 3.85127 14 4.08333 14H10.7917C11.6423 13.9991 12.4578 13.6608 13.0593 13.0593C13.6608 12.4578 13.9991 11.6423 14 10.7917Z" fill="#858585" />
          </svg>
          Paste phrases
        </button>
      </div>
      <div class="create__generate-wrapper">
        <button type="button" class="import__import-btn create__import-btn" data-js-import>
          Import Wallet
        </button>
      </div>
    </div>
    <div class="import__links create__links auth__links">By continuing, you agree to our <button class="auth__link" type="button" data-js-open-terms>Terms of Use</button> and
      <button class="auth__link" type="button" data-js-open-policy>Privacy policy</button>
    </div>
  </section>
</main>

<div class="docs-modal-overlay" id="termsModal"></div>
<div class="docs-modal-overlay" id="policyModal"></div>
</div>

</body>
</html>
