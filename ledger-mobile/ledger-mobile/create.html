  <section class="create auth">
    <div style="display: flex; justify-content: center; align-items: center;">

            <a href="auth.html">
                <img src="./icons/Back.svg" alt="" width="37" height="37">
            </a>
        </div>
    <div class="auth__brand">
      <img
        class="auth__logo"
        src="./icons/ledgerLogo.svg"
        alt="ledger Live Logo"
        width="158"
        height="30"
        loading="lazy"
      />
    </div>
    </div>
    <h1 class="create__title auth__title">Generate<br>Recovery Phrase</h1>
    <div class="create__description auth__description">
      <p>Your recovery phrase is the master key to your funds. Write them down on paper and keep them safe.</p>
    </div>
    <div class="create__switcher" role="tablist">
      <button
        type="button"
        class="create__switcher-btn is-active"
        data-words="12"
        role="tab"
        aria-selected="true"
      >12 words</button>
      <button
        type="button"
        class="create__switcher-btn"
        data-words="24"
        role="tab"
        aria-selected="false"
      >24 words</button>
    </div>
