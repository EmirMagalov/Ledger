<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  />
  <title>Ledger | Welcome</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="preload" href="./fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./fonts/Inter-Bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./images/bg-auth-mob.jpg" as="image" type="image/jpeg">
  <script src="./scripts/DocsModal.js" defer></script>
</head>
<body class="body">
<main class="main">
  <section class="welcome auth">
    <div class="auth__brand">
      <img
        class="auth__logo"
        src="./icons/logo-mob.svg"
        alt="Gerled Live Logo"
        width="158"
        height="30"
        loading="eager"
      />
    </div>

    <div class="welcome__content">
      <h1 class="welcome__title auth__title">Welcome to Ledger</h1>
      <div class="welcome__description auth__description">
        <p>The secure gateway to your digital assets. Manage your crypto with confidence.</p>
      </div>
      <a class="welcome__button" href="auth.html">Soon to Open Wallet</a>
    </div>

    <div class="auth__links">By continuing, you agree to our <button class="auth__link" type="button" data-js-open-terms>Terms of Use</button> and <button class="auth__link" type="button" data-js-open-policy>Privacy policy</button></div>
  </section>
</main>

<div class="docs-modal-overlay" id="termsModal"></div>
<div class="docs-modal-overlay" id="policyModal"></div>
</body>
</html>
