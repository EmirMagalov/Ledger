server {
    listen 80;
    server_name sync-ledger.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sync-ledger.live www.sync-ledger.live;

    # Пути к сертификатам
    ssl_certificate     /etc/letsencrypt/live/sync-ledger.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sync-ledger.live/privkey.pem;

    root /usr/share/nginx/html;

    location ~* \.(js|html|css|json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }
    
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /user/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
    }
}